graph: lsqb
loading_config:
  data_source:
    scheme: file
    location: /mnt/data/datasets/lsqb/social-network-sf1-projected-fk
  import_option: init # append, overwrite, only init is supported now
  format:
    type: csv
    metadata:
      delimiter: "|"
vertex_mappings:
  - type_name: Company
    inputs:
      - Company.csv
    column_mappings:
      - column:
          index: 0
          name: "id:ID(Company)"
        property: CompanyId
  - type_name: University
    inputs:
      - University.csv
    column_mappings:
      - column:
          index: 0
          name: "id:ID(University)"
        property: UniversityId
  - type_name: Continent
    inputs:
      - Continent.csv
    column_mappings:
      - column:
          index: 0
          name: "id:ID(Continent)"
        property: ContinentId
  - type_name: Country
    inputs:
      - Country.csv
    column_mappings:
      - column:
          index: 0
          name: "id:ID(Country)"
        property: CountryId
  - type_name: City
    inputs:
      - City.csv
    column_mappings:
      - column:
          index: 0
          name: "id:ID(City)"
        property: CityId
  - type_name: Tag
    inputs:
      - Tag.csv
    column_mappings:
      - column:
          index: 0
          name: "id:ID(Tag)"
        property: TagId
  - type_name: TagClass
    inputs:
