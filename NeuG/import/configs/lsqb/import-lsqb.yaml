          index: 0
          name: "id:ID(TagClass)"
        property: TagClassId
  - type_name: Forum
    inputs:
      - Forum.csv
    column_mappings:
      - column:
          index: 0
          name: "id:ID(Forum)"
        property: ForumId
  - type_name: Comment
    inputs:
