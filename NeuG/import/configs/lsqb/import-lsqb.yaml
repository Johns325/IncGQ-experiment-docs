    column_mappings:
      - column:
          index: 0
          name: "id:ID(Post)"
        property: PostId
  - type_name: Person
    inputs:
      - Person.csv
    column_mappings:
      - column:
          index: 0
          name: "id:ID(Person)"
        property: PersonId
edge_mappings:
  - type_triplet:
      edge: City_isPartOf_Country
      source_vertex: City
      destination_vertex: Country
    inputs:
      - City_isPartOf_Country.csv
    source_vertex_mappings:
      - column:
          index: 0
          name: ":START_ID(City)"
        property: CityId
    destination_vertex_mappings:
      - column:
          index: 1
          name: ":END_ID(Country)"
        property: CountryId
  - type_triplet:
      edge: Comment_hasCreator_Person
      source_vertex: Comment
